name: Prebuilds

on:
  workflow_dispatch:
  push:
    branches:
      - ci/prebuild

permissions: {}

jobs:
  prebuild:
    name: Prebuilds win32-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - arch: x64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild package
        run: npm run prebuilds

      - name: Upload prebuilds
        uses: actions/upload-artifact@v7
        with:
          name: win32-${{ matrix.arch }}
          path: prebuilds/win32-${{ matrix.arch }}/
          if-no-files-found: error
